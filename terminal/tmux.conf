# prefix: Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# pane navigation: prefix + hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# splits: prefix + v/s (like vim)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# terminal: true color passthrough for ghostty
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-ghostty:RGB"

# mouse: scroll, click to select pane/window, resize panes
set -g mouse on

# scroll up enters copy mode automatically, vi keys to navigate
setw -g mode-keys vi

# session picker: prefix + Tab — fzf popup with fuzzy search
bind Tab display-popup -E "\
  tmux list-sessions -F '#{session_name}' | \
  fzf --reverse --no-preview | \
  xargs tmux switch-client -t"
